testSuite: "Zoya V2 E2E Testing"
description: "Pengujian Semantic LLM menggunakan TestSprite untuk memastikan chatbot Zoya V2 mematuhi PRD dan Business Logic."
targetEndpoint: "http://localhost:3000/test-ai"
setup:
  beforeEach:
    - action: "POST"
      url: "http://localhost:3000/test-ai/clear"
      body:
        thread_id: "{{scenario.id}}"
      description: "Pastikan memori thread di-reset sebelum skenario dimulai."

scenarios:
  - id: "test_sprite_scenario_a"
    name: "Skenario A (Repaint Bodi Halus + Upsell)"
    description: "Memastikan bot menahan harga sampai tahu warna, lalu memberikan harga beserta penawaran Cuci Komplit."
    steps:
      - user: "mas mau repaint nmax"
      - assert_bot: "Bot HANYA BOLEH menanyakan bagian mana yang mau direpaint ATAU warna yang diinginkan. Bot DILARANG memberikan harga apapun pada tahap ini."
      - user: "bodi halus warna merah candy"
      - assert_bot: "Bot memberikan estimasi harga Repaint Bodi Halus Nmax. Bot WAJIB menyertakan informasi adanya biaya tambahan (surcharge) untuk warna Candy. Bot WAJIB menawarkan/menyarankan layanan tambahan Cuci Komplit."

  - id: "test_sprite_scenario_b"
    name: "Skenario B (Repaint Velg Constraint)"
    description: "Memastikan bot menanyakan kondisi velg (ori/repaint) sebelum memberikan harga velg."
    steps:
      - user: "mau repaint velg vario 150 warna gold"
      - assert_bot: "Bot HANYA BOLEH menanyakan kondisi velg saat ini (apakah masih cat original pabrik atau sudah pernah direpaint sebelumnya). Bot DILARANG KERAS memberikan harga velg pada tahap ini."
      - user: "udah pernah direpaint om"
      - assert_bot: "Bot memberikan harga repaint velg untuk Vario 150. Bot WAJIB memberikan peringatan atau menginformasikan bahwa akan ada tambahan biaya untuk cairan Paint Remover."

  - id: "test_sprite_scenario_c"
    name: "Skenario C (Objection Handling)"
    description: "Customer menanyakan harga, lalu beralasan menunda. Pastikan bot merespon dengan empati tanpa memaksakan penjualan."
    steps:
      - user: "poles bodi aerox berapa?"
      - assert_bot: "Bot menanyakan jenis cat motor (Glossy atau Doff)."
      - user: "warna glossy"
      - assert_bot: "Bot memberikan estimasi harga poles bodi Aerox."
      - user: "waduh jauh om rumah saya di bekasi, nanti dulu deh nabung dulu"
      - assert_bot: "Bot merespons dengan empati, ramah, dan santai. Bot mempersilakan customer untuk menghubungi kembali kapan saja. Bot DILARANG KERAS menanyakan kapan customer mau datang atau memaksa customer untuk booking."

  - id: "test_sprite_scenario_d"
    name: "Skenario D (Anti-Coating on Repaint)"
    description: "Customer minta Repaint Bodi Halus + Coating. Pastikan bot hanya menawarkan Cuci Komplit dan menolak Coating."
    steps:
      - user: "om mau repaint bodi halus nmax warna hitam doff sama sekalian di coating bisa?"
      - assert_bot: "Bot memberikan harga repaint bodi halus. Bot WAJIB mengedukasi customer bahwa cat baru belum bisa langsung di-coating karena butuh waktu curing (kering) selama kurang lebih 1 bulan. Bot WAJIB menyarankan Cuci Komplit sebagai ganti dari Coating."

  - id: "test_sprite_scenario_e"
    name: "Skenario E (Multi-Motor Focus)"
    description: "Customer tanya harga repaint Nmax dan poles Vario. Pastikan bot mengunci obrolan untuk Nmax terlebih dahulu."
    steps:
      - user: "om mau nanya dong, kalau repaint bodi halus nmax warna hitam doff berapa? sekalian nanya kalau poles vario 150 glossy kena berapa ya?"
      - assert_bot: "Bot HANYA memberikan informasi harga untuk Repaint Bodi Halus Nmax. Bot WAJIB menyampaikan secara natural (menggunakan bahasa santai/bercanda) bahwa mereka akan fokus membahas motor Nmax terlebih dahulu sebelum beralih membahas Vario."
