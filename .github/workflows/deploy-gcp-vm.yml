name: Deploy to GCP VM

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # bisa trigger manual dari GitHub UI

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: ${{ secrets.GCP_REGION }}
  ZONE: ${{ secrets.GCP_ZONE }}   # contoh: asia-southeast2-a
  IMAGE: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/whatsapp-bot/app
  VM_NAME: whatsapp-bot-vm

jobs:
  build-and-deploy:
    name: 🚀 Build, Push & Update VM
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔐 Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: ⚙️ Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: 🐳 Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: 🔨 Build Docker Image
        run: |
          docker build \
            -t ${{ env.IMAGE }}:${{ github.sha }} \
            -t ${{ env.IMAGE }}:latest \
            .

      - name: 📤 Push to Artifact Registry
        run: |
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

      - name: 🖥️ Rolling update di VM
        run: |
          gcloud compute ssh ${{ env.VM_NAME }} \
            --zone=${{ env.ZONE }} \
            --quiet \
            --command="
              set -e
              echo '📥 Pull image baru...'
              gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet
              docker pull ${{ env.IMAGE }}:${{ github.sha }}

              echo '♻️ Restart container dengan image baru...'
              cd ~/whatsapp-bot
              
              # Update image tag di docker-compose
              sed -i 's|image:.*|image: ${{ env.IMAGE }}:${{ github.sha }}|' docker-compose.yml
              
              docker-compose up -d
              
              echo '🧹 Cleanup old images...'
              docker image prune -f
              
              echo '=============================='
              echo '✅ Update selesai!'
              docker-compose ps
              echo '=============================='
            "
